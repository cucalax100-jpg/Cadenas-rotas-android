name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v1
      with:
        version: 3.5.3
        include-templates: true
        
    - name: Export APK
      run: godot --headless --export "Android" cadenas-rotas.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cadenas-rotas-apk
        path: cadenas-rotas.apk
