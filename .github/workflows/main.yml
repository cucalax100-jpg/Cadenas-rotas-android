name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip wget
      
      - name: Download Godot 3.5.3 Headless
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip Godot_v3.5.3-stable_linux_headless.64.zip
          mv Godot_v3.5.3-stable_linux_headless.64 godot
          chmod +x godot
      
      - name: Download Export Templates 3.5.3
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          unzip Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/
      
      - name: Export APK Debug
        run: |
          mkdir -p build
          ./godot --headless --export-debug "Android" build/cadenas-rotas.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cadenas-rotas-apk
          path: build/cadenas-rotas.apk
