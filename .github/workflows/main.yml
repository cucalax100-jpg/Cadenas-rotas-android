name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot 3.5.3
      uses: pbar1/setup-godot@v1.0.2
      with:
        godot-version: 3.5.3
        export-templates-version: 3.5.3
        
    - name: Export APK
      run: godot --headless --export "Android" cadenas-rotas.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cadenas-rotas-apk
        path: cadenas-rotas.apk
